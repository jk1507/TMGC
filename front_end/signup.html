<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SDDS Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">
    <h1 class="auth-title">[ SDDS ]</h1>
    <p class="auth-sub">Create Secure Identity</p>

    <form id="signupForm">
        <input type="text" placeholder="Full Name" id="name" required>
        <input type="email" placeholder="Email Address" id="email" required>
        <input type="text" placeholder="Mobile Number" id="mobile" required>
        <input type="password" placeholder="Password" id="password" required>

        <button type="submit">REGISTER →</button>
    </form>

    <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script src="auth.js"></script>
</body>
</html>
