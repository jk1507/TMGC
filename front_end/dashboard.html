<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body style="background:#080c10;color:white;font-family:Arial;padding:40px;">
  <h1>Dashboard</h1>
  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    if (user) {
      document.body.innerHTML += "<p>Welcome, " + user.name + "</p>";
      document.body.innerHTML += "<p>Email: " + user.email + "</p>";
    } else {
      document.body.innerHTML += "<p>No user logged in.</p>";
    }
  </script>
</body>
</html>
